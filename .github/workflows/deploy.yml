name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='*.md'
          path: ./
          remote_path: /var/www/cuan-dong.com/
          remote_host: 163.61.44.41
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 163.61.44.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chown -R www-data:www-data /var/www/cuan-dong.com
            chmod -R 755 /var/www/cuan-dong.com
            echo "Deploy done: $(date)"
