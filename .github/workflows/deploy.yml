name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.61.44.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./"
          target: "/var/www/cuan-dong.com"
          rm: true
          exclude: ".git,.github,node_modules,*.md"

      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 163.61.44.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: chown -R www-data:www-data /var/www/cuan-dong.com
